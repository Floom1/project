{% extends "base.html" %}

{% block title %}Уведомления — HR-Сервис{% endblock %}

{% block content %}
<h4 class="mb-4"><i class="bi bi-bell me-2"></i>Уведомления</h4>

<div class="card shadow-sm">
  <div class="list-group list-group-flush">
    {% for n in notifications %}
      <a href="{{ n.link|default:'#' }}" class="list-group-item list-group-item-action {% if not n.is_read %}list-group-item-light{% endif %}">
        <div class="d-flex justify-content-between">
          <strong>{{ n.title }}</strong>
          <small class="text-muted">{{ n.created_at|date:"d.m.Y H:i" }}</small>
        </div>
        <div class="small text-muted">{{ n.message }}</div>
      </a>
    {% empty %}
      <div class="list-group-item text-center text-muted py-4">Уведомлений нет</div>
    {% endfor %}
  </div>
</div>
{% endblock %}
